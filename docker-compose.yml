
services:
  web:
    container_name: core_api
    build: ./clbb-io/core/.
    ports:
      - "${API_PORT}:9900" # Usa la variable API_PORT desde el archivo .env
    env_file:
      - .env # Declara el archivo .env aquí
    volumes:
      - ./clbb-io/core/.:/app
    depends_on:
      - db
    networks:
      - clbb_core

  dashboard-builder:
    container_name: dashboard_builder
    build:
      context: ./clbb-front
      dockerfile: Dockerfile
      args:
        - VITE_SERVER_ADDRESS=${IP_ADDRESS}:${FRONT_PORT}
        - VITE_REMOTE_CONTROLLER_URL=http://${IP_ADDRESS}:${FRONT_PORT}/remote-controller/
    volumes:
      - dashboard_build:/app/dist
    command: ["pnpm", "run", "build"]
    networks:
      - clbb_core

  remote-controller:
    container_name: remote-controller
    build:
      context: ./clbb-remote-controller
      dockerfile: Dockerfile
      args:
        - VITE_SERVER_ADDRESS=${IP_ADDRESS}:${FRONT_PORT}
        - VITE_URL_ADDRESS=${IP_ADDRESS}:${URL_PORT}
    volumes:
      - remote_controller_build:/app/dist
    command: ["pnpm", "run", "build"]
    depends_on:
      - web
    networks:
      - clbb_core

  projection:
    container_name: projection
    build: 
      context: ./clbb-projection
      dockerfile: Dockerfile
      args:
        - VITE_SERVER_ADDRESS=${IP_ADDRESS}:${FRONT_PORT}
    volumes:
      - projection_build:/app/dist
    command: ["pnpm", "run", "build"]
    depends_on:
      - web
    networks:
      - clbb_core

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-front   
    env_file:
      - .env 
    volumes:
      - projection_build:/usr/share/nginx/html/clbb-projection
      - remote_controller_build:/usr/share/nginx/html/clbb-remote-controller
      - dashboard_build:/usr/share/nginx/html/clbb-front
    ports:
      - "${FRONT_PORT}:80"
    depends_on:
      - web
      - dashboard-builder
      - remote-controller
      - projection
    networks:
      - clbb_core

  db:
    container_name: core_db
    image: postgres:latest
    env_file:
      - .env
    volumes:
      - postgres_data_core:/var/lib/postgresql/
      - ./dumps:/dumps
    ports:
      - "${DB_PORT}:5432"
    networks:
      - clbb_core

  redis:
    image: redis:alpine
    container_name: redis-cs
    # ports:
    #   - "6379:6379"
    restart: always
    networks:
      - clbb_core

networks:
  clbb_core:
    name: clbb_core # Para que la red tenga este nombre EXACTO
    driver: bridge

volumes:
  postgres_data_core:
  dashboard_build:
  remote_controller_build:
  projection_build:
